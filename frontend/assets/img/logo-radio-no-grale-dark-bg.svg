<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120" role="img" aria-labelledby="title">
  <title id="title">RADIO NO GRALE - logo completo</title>
  <defs>
    <style>
      .rg {
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: 43.2px;
        letter-spacing: 0.04em;
        fill: #e11d2e;
      }
      .title {
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: 36.8px;
        letter-spacing: 0.04em;
        fill: #f5f5f5;
      }
      .tagline {
        font-family: Inter, sans-serif;
        font-size: 23px;
        letter-spacing: 0.14em;
        fill: #8a8a8a;
        text-transform: uppercase;
      }
    </style>
    <linearGradient id="topGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e11d2e" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#e11d2e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="120" fill="#070707"/>
  <rect width="640" height="34" fill="url(#topGlow)"/>
  <g transform="translate(32 36) scale(2)">
    <rect x="4" y="4" width="44" height="44" fill="rgba(225, 29, 46, 0.18)"/>
    <rect x="0" y="0" width="44" height="44" fill="#070707" stroke="#e11d2e" stroke-width="2"/>
    <text class="rg" x="22" y="30.5" text-anchor="middle">RG</text>
  </g>
  <g transform="translate(148 38)">
    <text class="title" x="0" y="28">RADIO NO GRALE</text>
    <text class="tagline" x="0" y="58">A RADIO MAIS POGGERS DE RONDONIA STATE OF BRAZIL</text>
  </g>
</svg>
