name: radiopoggers_app
description: RADIO NO GRALE — app nativo Windows e Android.
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.3
  media_kit: ^1.1.11
  media_kit_libs_windows_video: ^1.0.10
  media_kit_libs_android_video: ^1.3.6
  record: ^6.0.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  file_picker: ^8.1.7
  audio_decoder: ^0.8.1
  package_info_plus: ^8.1.2
  archive: ^4.0.7
  crypto: ^3.0.6
  open_filex: ^4.6.0
  path: ^1.9.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ascii/
    - assets/narrator_samples/
    - assets/narrator_samples/miku/
    - assets/narrator_samples/hoshino/
    - assets/img/
    - assets/radio_imaging/
    - assets/radio_imaging/manifest.json
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
